name: Bug Report
description: Report a bug to help us improve BrowserWing
title: "[Bug] "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below to help us understand and reproduce the issue.

        > Before submitting, please [search existing issues](https://github.com/browserwing/browserwing/issues) to check if it has already been reported.

  - type: input
    id: version
    attributes:
      label: BrowserWing Version
      description: You can find the version in the footer of the web UI, or run the binary with `--version`.
      placeholder: "e.g. v1.0.0 or v1.1.0-beta.1"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (CentOS/RHEL)
        - Linux (Other)
        - Windows
        - Windows (WSL)
        - Docker
        - Other
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Problem Area
      description: Which part of BrowserWing is affected?
      multiple: true
      options:
        - Browser Launch / Management
        - Script Recording
        - Script Playback
        - AI Agent / Chat
        - AI Explorer
        - Scheduled Tasks
        - LLM Configuration
        - Browser Instances
        - MCP Server
        - Web UI
        - API
        - Other
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser Type
      description: Which browser are you using with BrowserWing?
      options:
        - Google Chrome
        - Chromium
        - Remote Browser (via ControlURL)
        - Not applicable
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open BrowserWing web UI
        2. Go to '...'
        3. Click on '...'
        4. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant logs or error messages here. You can find logs in the terminal where BrowserWing is running.
      render: shell
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: |
        If relevant, share your config.toml or browser instance settings (remove sensitive info like API keys).
      render: toml
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information about the problem.
    validations:
      required: false
