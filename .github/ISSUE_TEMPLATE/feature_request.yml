name: Feature Request
description: Suggest a new feature or improvement for BrowserWing
title: "[Feature] "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea clearly so we can evaluate and discuss it.

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which part of BrowserWing does this relate to?
      options:
        - Browser Management
        - Script Recording / Playback
        - AI Agent / Chat
        - AI Explorer
        - Scheduled Tasks
        - LLM Integration
        - MCP Server
        - Web UI / UX
        - API / SDK
        - Configuration
        - Deployment / Docker
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: |
        Is your feature request related to a problem? Please describe.
        A clear description of what the problem is, e.g. "I'm always frustrated when..."
      placeholder: Describe the problem or motivation behind this feature...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like. How should this feature work?
      placeholder: Describe your ideal solution...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, mockups, screenshots, or references about the feature request here.
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Willingness to Contribute
      description: Would you be willing to contribute this feature via a pull request?
      options:
        - label: "I'd be willing to submit a PR for this feature"
